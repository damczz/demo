<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — AI Receptionist</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        color: #2c3e50;
      }

      .container {
        max-width: 600px;
        text-align: center;
        background: white;
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(44, 62, 80, 0.1);
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #2E75B6;
        margin-bottom: 20px;
        letter-spacing: -0.5px;
      }

      p {
        font-size: 1.15rem;
        line-height: 1.6;
        color: #546e7a;
        margin-bottom: 30px;
      }

      .highlight {
        background: #e8f4fd;
        padding: 3px 8px;
        border-radius: 4px;
        color: #2E75B6;
        font-weight: 600;
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.8;
      }
    </style>
    <script
      id="retell-widget"
      src="https://dashboard.retellai.com/retell-widget-v2.js"
      data-voice-public-key="public_key_ba8b7f058d515b3e23e7a"
      data-voice-agent-id="agent_66ad6e83b6c738cfd331c232f7"
      data-title="Talk to Aria"
      data-color="#2E75B6"
      data-fab-text="Talk to our AI receptionist"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="icon">🩺</div>
      <h1>ChiroClinic AI Demo</h1>
      <p>Click the <span class="highlight">button in the bottom right</span> to speak with our AI receptionist.</p>
    </div>
  </body>
</html>
